name: youtube-ai-pipeline

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:

    runs-on: ubuntu-latest

    timeout-minutes: 180

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

      YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
      YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
      YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
      YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}

    steps:

      # -------------------------------
      # Checkout repository
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4


      # -------------------------------
      # Setup Python
      # -------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      # -------------------------------
      # Cache pip dependencies
      # -------------------------------
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-


      # -------------------------------
      # Cache pipeline artifacts
      # -------------------------------
      - name: Cache artifacts
        uses: actions/cache@v4
        with:
          path: |
            artifacts
            kaggle_pipeline/input
          key: artifacts-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            artifacts-${{ runner.os }}-


      # -------------------------------
      # Install dependencies
      # -------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt


      # -------------------------------
      # Install Kaggle CLI (explicit)
      # -------------------------------
      - name: Ensure Kaggle CLI installed
        run: |
          pip install kaggle


      # -------------------------------
      # Configure Kaggle auth before pipeline
      # -------------------------------
      - name: Configure Kaggle credentials
        run: |
          set -euo pipefail
          mkdir -p ~/.kaggle
          cat > ~/.kaggle/kaggle.json << 'EOF'
          {
            "username": "${KAGGLE_USERNAME}",
            "key": "${KAGGLE_KEY}"
          }
          EOF
          sed -i "s|\${KAGGLE_USERNAME}|${KAGGLE_USERNAME}|g" ~/.kaggle/kaggle.json
          sed -i "s|\${KAGGLE_KEY}|${KAGGLE_KEY}|g" ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Debug - env check
        run: |
          echo "KAGGLE_USERNAME=${KAGGLE_USERNAME}"
          echo "HF_TOKEN length=${#HF_TOKEN}"
          echo "NEWS_API_KEY length=${#NEWS_API_KEY}"
          
      # -------------------------------
      # Run the AI video pipeline
      # -------------------------------
      - name: Run pipeline
        run: |
          python -u pipeline.py


      # -------------------------------
      # Force Kaggle dataset upload even on partial failure
      # -------------------------------
      - name: Force Kaggle dataset upload
        if: always()
        run: |
          set -euo pipefail
          mkdir -p kaggle_pipeline/input
          if [ -f kaggle_pipeline/transcript.txt ]; then
            cp kaggle_pipeline/transcript.txt kaggle_pipeline/input/transcript.txt
          fi

          DATASET_SLUG="${KAGGLE_DATASET_SLUG:-open-university-video-input}"
          OWNER_SLUG="${KAGGLE_USERNAME}/${DATASET_SLUG}"

          if [ ! -f kaggle_pipeline/input/dataset-metadata.json ]; then
            cat > kaggle_pipeline/input/dataset-metadata.json << 'EOF'
{
  "title": "Open University Video Input",
  "id": "__OWNER_SLUG__",
  "licenses": [{"name": "CC0-1.0"}]
}
EOF
            sed -i "s|__OWNER_SLUG__|${OWNER_SLUG}|g" kaggle_pipeline/input/dataset-metadata.json
          fi

          if ! kaggle datasets status "${OWNER_SLUG}" >/dev/null 2>&1; then
            kaggle datasets create -p kaggle_pipeline/input --dir-mode zip || true
          fi

          kaggle datasets version -p kaggle_pipeline/input -m "auto update" --dir-mode zip || true


      # -------------------------------
      # Upload artifacts for debugging
      # -------------------------------
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts
          path: artifacts
