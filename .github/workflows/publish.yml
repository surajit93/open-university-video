name: Autonomous YouTube Growth Engine

on:
  schedule:
    # Video 1
    - cron: "0 10 * * *"
    # Video 2
    - cron: "0 18 * * *"
    # Retention update
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
      YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
      YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
      YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcloud.json

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # -------------------------------
      # System Dependencies
      # -------------------------------

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      # -------------------------------
      # Python Setup
      # -------------------------------

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            openai \
            requests \
            moviepy \
            numpy \
            scipy \
            pytrends \
            google-api-python-client \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-cloud-texttospeech

      # -------------------------------
      # Google Cloud Credentials
      # -------------------------------

      - name: Create Google Cloud Credential File
        run: echo '${{ secrets.GOOGLE_CLOUD_JSON }}' > gcloud.json

      # -------------------------------
      # Decide Mode
      # -------------------------------

      - name: Decide Run Mode
        id: mode
        run: |
          HOUR=$(date -u +"%H")
          if [ "$HOUR" = "20" ]; then
            echo "MODE=retention_update" >> $GITHUB_ENV
          else
            echo "MODE=normal" >> $GITHUB_ENV
          fi

      # -------------------------------
      # Run Engine
      # -------------------------------

      - name: Run YouTube Engine
        run: |
          if [ "$MODE" = "retention_update" ]; then
            echo "Running delayed retention update..."
            MODE=retention_update python trend_based_youtube_video_generator_uploader.py
          else
            echo "Generating and uploading video..."
            python trend_based_youtube_video_generator_uploader.py
          fi
