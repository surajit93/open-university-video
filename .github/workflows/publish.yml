name: youtube-ai-pipeline

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:

    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

      YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
      YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
      YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
      YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}

    steps:

      # -------------------------------
      # Checkout
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # Python setup
      # -------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------
      # Cache pip
      # -------------------------------
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      # -------------------------------
      # Cache artifacts
      # -------------------------------
      - name: Cache artifacts
        uses: actions/cache@v4
        with:
          path: |
            artifacts
            kaggle_pipeline/input
          key: artifacts-${{ runner.os }}-${{ github.run_id }}
          restore-keys: artifacts-${{ runner.os }}-

      # -------------------------------
      # Install deps
      # -------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          pip install kaggle

      # -------------------------------
      # Kaggle auth (FIXED)
      # -------------------------------
      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          cat > ~/.kaggle/kaggle.json <<EOF
{
  "username": "${KAGGLE_USERNAME}",
  "key": "${KAGGLE_KEY}"
}
EOF
          chmod 600 ~/.kaggle/kaggle.json

      # -------------------------------
      # Debug env (safe visibility)
      # -------------------------------
      - name: Debug env
        run: |
          echo "KAGGLE_USERNAME=${KAGGLE_USERNAME}"
          echo "HF_TOKEN length=${#HF_TOKEN}"

      # -------------------------------
      # Run pipeline (unbuffered)
      # -------------------------------
      - name: Run pipeline
        run: |
          python -u pipeline.py || true

      # -------------------------------
      # Ensure Kaggle dataset upload (FIXED EOF)
      # -------------------------------
      - name: Force Kaggle dataset upload
        if: always()
        run: |
          mkdir -p kaggle_pipeline/input

          if [ -f kaggle_pipeline/transcript.txt ]; then
            cp kaggle_pipeline/transcript.txt kaggle_pipeline/input/transcript.txt
          fi

          DATASET_SLUG="${KAGGLE_DATASET_SLUG:-open-university-video-input}"
          OWNER_SLUG="${KAGGLE_USERNAME}/${DATASET_SLUG}"

          if [ ! -f kaggle_pipeline/input/dataset-metadata.json ]; then
cat > kaggle_pipeline/input/dataset-metadata.json <<EOF
{
  "title": "Open University Video Input",
  "id": "${OWNER_SLUG}",
  "licenses": [{"name": "CC0-1.0"}]
}
EOF
          fi

          kaggle datasets status "${OWNER_SLUG}" >/dev/null 2>&1 || \
            kaggle datasets create -p kaggle_pipeline/input --dir-mode zip || true

          kaggle datasets version -p kaggle_pipeline/input -m "auto update" --dir-mode zip || true

      # -------------------------------
      # Upload artifacts
      # -------------------------------
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts
          path: artifacts
