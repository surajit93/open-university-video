name: Autonomous YouTube Growth Engine

on:
  schedule:
    # Video 1
    - cron: "0 10 * * *"
    # Video 2
    - cron: "0 18 * * *"
    # Retention update
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
      YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
      YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
      YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcloud.json
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      # ----------------------------------
      # Checkout
      # ----------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ----------------------------------
      # Cache APT packages (ffmpeg/imagemagick)
      # ----------------------------------
      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: |
            /var/cache/apt
            /var/lib/apt
          key: ${{ runner.os }}-apt-cache

      # ----------------------------------
      # System Dependencies
      # ----------------------------------
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      # Fix ImageMagick security policy for TextClip
      - name: Fix ImageMagick Policy
        run: |
          sudo sed -i 's/rights="none"/rights="read|write"/g' /etc/ImageMagick-6/policy.xml || true

      # ----------------------------------
      # Install yt-dlp (cached binary)
      # ----------------------------------
      - name: Cache yt-dlp
        uses: actions/cache@v3
        with:
          path: /usr/local/bin/yt-dlp
          key: ${{ runner.os }}-yt-dlp

      - name: Install yt-dlp if not cached
        run: |
          if ! command -v yt-dlp &> /dev/null
          then
            sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
            sudo chmod a+rx /usr/local/bin/yt-dlp
          fi

      # ----------------------------------
      # Python Setup (with dependency caching)
      # ----------------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python Dependencies (Pinned Stable Versions)
        run: |
          python -m pip install --upgrade pip

          pip install \
              moviepy==1.0.3 \
              imageio \
              imageio-ffmpeg \
              numpy \
              scipy \
              pillow==9.5.0 \
              groq \
              requests \
              pytrends \
              google-api-python-client \
              google-auth \
              google-auth-oauthlib \
              google-auth-httplib2 \
              google-cloud-texttospeech

      # ----------------------------------
      # Google Cloud Credentials (BASE64 SAFE)
      # ----------------------------------
      - name: Create Google Cloud Credential File
        run: |
          echo "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}" | base64 -d > gcloud.json

      # ----------------------------------
      # Decide Mode (Safe logic aligned to cron)
      # ----------------------------------
      - name: Decide Run Mode
        run: |
          HOUR=$(date -u +"%H")

          if [ "$HOUR" = "23" ]; then
            echo "MODE=retention_update" >> $GITHUB_ENV
          else
            echo "MODE=normal" >> $GITHUB_ENV
          fi

      # ----------------------------------
      # Run Engine
      # ----------------------------------
      - name: Run YouTube Engine
        run: |
          if [ "$MODE" = "retention_update" ]; then
            echo "Running delayed retention update..."
            MODE=retention_update python trend_based_youtube_video_generator_uploader.py
          else
            echo "Generating and uploading video..."
            python trend_based_youtube_video_generator_uploader.py
          fi
